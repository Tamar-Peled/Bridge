<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRIDGE — כניסה</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#5BB7B7;
      --primary-dk:#449494;
      --primary-soft:rgba(91,183,183,.14);
      --dark:#333333;
      --mid:#5c6566;
      --light:#8a9696;
      --card:#ffffff;
      --teal-tint:#E6F4F4;
      --shadow:0 8px 28px rgba(51,51,51,.08);
      --shadow-hover:0 14px 36px rgba(91,183,183,.22);
      --radius-card:20px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Heebo',sans-serif;
      min-height:100vh;
      margin:0;
      color:var(--dark);
      background:linear-gradient(180deg,#ffffff 0%,var(--teal-tint) 55%,#dff2f2 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:32px 20px 40px;
    }
    .gateway-wrap{
      width:100%;
      max-width:420px;
      text-align:center;
    }
    .gateway-logo{
      width:72px;height:72px;border-radius:20px;
      background:linear-gradient(145deg,var(--primary) 0%,var(--primary-dk) 100%);
      color:#fff;font-size:32px;font-weight:900;
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 20px;
      box-shadow:var(--shadow);
    }
    .gateway-brand{font-size:15px;font-weight:700;color:var(--light);letter-spacing:.02em;margin-bottom:8px}
    .gateway-title{
      font-size:clamp(26px,5vw,32px);
      font-weight:900;
      color:var(--dark);
      line-height:1.25;
      margin-bottom:10px;
      letter-spacing:-.3px;
    }
    .gateway-sub{
      font-size:15px;
      color:var(--mid);
      line-height:1.5;
      margin-bottom:32px;
      font-weight:600;
    }
    .gateway-cards{
      display:flex;
      flex-direction:column;
      gap:16px;
    }
    a.gateway-card{
      display:flex;
      align-items:center;
      gap:18px;
      text-align:right;
      text-decoration:none;
      color:inherit;
      background:var(--card);
      border:1.5px solid rgba(91,183,183,.35);
      border-radius:var(--radius-card);
      padding:22px 20px;
      box-shadow:var(--shadow);
      transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease,background .2s ease;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    a.gateway-card:hover{
      transform:translateY(-4px);
      box-shadow:var(--shadow-hover);
      border-color:var(--primary);
      background:linear-gradient(135deg,#fff 0%,var(--primary-soft) 100%);
    }
    a.gateway-card:active{transform:translateY(-1px)}
    a.gateway-card:focus-visible{
      outline:3px solid var(--primary);
      outline-offset:3px;
    }
    .gateway-card-icon{
      width:56px;height:56px;border-radius:16px;
      background:var(--primary-soft);
      color:var(--primary-dk);
      display:flex;align-items:center;justify-content:center;
      font-size:28px;
      flex-shrink:0;
    }
    .gateway-card-body{flex:1;min-width:0}
    .gateway-card-title{
      font-size:18px;
      font-weight:800;
      color:var(--dark);
      margin-bottom:4px;
    }
    .gateway-card-desc{
      font-size:13px;
      color:var(--mid);
      font-weight:600;
      line-height:1.4;
    }
    .gateway-card-arrow{
      color:var(--primary);
      font-size:22px;
      font-weight:700;
      opacity:.85;
    }
    .gateway-footer{
      margin-top:40px;
      font-size:12px;
      color:var(--light);
      font-weight:600;
    }
  </style>
</head>
<body>
  <div class="gateway-wrap">
    <div class="gateway-logo" aria-hidden="true">B</div>
    <div class="gateway-brand">BRIDGE</div>
    <h1 class="gateway-title">ברוכים הבאים ל-BRIDGE</h1>
    <p class="gateway-sub">מערכת הליווי האישית שלכם — בחרו כניסה</p>

    <nav class="gateway-cards" aria-label="בחירת ממשק">
      <a class="gateway-card" href="counselor_v3.html">
        <div class="gateway-card-icon" aria-hidden="true">👩‍🏫</div>
        <div class="gateway-card-body">
          <div class="gateway-card-title">כניסת יועצת</div>
          <div class="gateway-card-desc">ניהול תלמידים, תיקים וסיכומי פגישות</div>
        </div>
        <span class="gateway-card-arrow" aria-hidden="true">‹</span>
      </a>
      <a class="gateway-card" href="student_v3.html">
        <div class="gateway-card-icon" aria-hidden="true">🎓</div>
        <div class="gateway-card-body">
          <div class="gateway-card-title">כניסת תלמיד</div>
          <div class="gateway-card-desc">משימות שבועיות והתקדמות אישית</div>
        </div>
        <span class="gateway-card-arrow" aria-hidden="true">‹</span>
      </a>
    </nav>

    <p class="gateway-footer">BRIDGE © 2026 — כל הזכויות שמורות</p>
  </div>
</body>
</html>
